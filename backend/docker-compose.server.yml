services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: pihub-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant_data:/qdrant/storage
      - backend_logs:/var/log/qdrant
    expose:
      - "6333"
      - "6334"
    ports:
      - "6333:6333"
      - "6334:6334"

  content-pipeline:
    build:
      context: .
      dockerfile: content-pipeline/Dockerfile
      network: host
    container_name: pihub-content-pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-educational_chunks}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_CACHE_DIR: ${EMBEDDING_CACHE_DIR:-/shared/models/sentence-transformers/embedding}
      LOCAL_RETRIEVAL_MODEL_NAME: ${LOCAL_RETRIEVAL_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      LOCAL_RETRIEVAL_DEVICE: ${LOCAL_RETRIEVAL_DEVICE:-cpu}
      LOCAL_RETRIEVAL_CACHE_DIR: ${LOCAL_RETRIEVAL_CACHE_DIR:-/shared/models/sentence-transformers/retrieval}
      UPLOAD_DIR: ${UPLOAD_DIR:-/shared/uploads}
      WORK_DIR: ${WORK_DIR:-/shared/work}
    depends_on:
      - qdrant
    volumes:
      - shared_storage:/shared
      - ../generated_pack:/shared/generated_pack:ro
      - backend_logs:/logs
    expose:
      - "8001"
    ports:
      - "8001:8001"

  inference-service:
    build:
      context: .
      dockerfile: inference-service/Dockerfile
      network: host
    container_name: pihub-inference-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CONTENT_PIPELINE_URL: ${CONTENT_PIPELINE_URL:-http://content-pipeline:8001}
      LLAMA_SERVER_HOST: ${LLAMA_SERVER_HOST:-127.0.0.1}
      LLAMA_SERVER_PORT: ${LLAMA_SERVER_PORT:-8081}
      LLAMA_MODEL_PATH: ${LLAMA_MODEL_PATH:-/models/model.gguf}
      LLAMA_CONTEXT_SIZE: ${LLAMA_CONTEXT_SIZE:-2048}
      LLAMA_MAX_TOKENS: ${LLAMA_MAX_TOKENS:-256}
      LLAMA_TEMPERATURE: ${LLAMA_TEMPERATURE:-0.4}
      LLAMA_TOP_P: ${LLAMA_TOP_P:-0.9}
      LLAMA_PROMPT_CACHE_SIZE: ${LLAMA_PROMPT_CACHE_SIZE:-128}
      CONTENT_GENERATION_BACKEND: ${CONTENT_GENERATION_BACKEND:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      GEMMA_CONTENT_MODEL: ${GEMMA_CONTENT_MODEL:-gemma4}
      CONTENT_GENERATION_TEMPERATURE: ${CONTENT_GENERATION_TEMPERATURE:-0.2}
      CONTENT_GENERATION_TOP_P: ${CONTENT_GENERATION_TOP_P:-0.9}
      CONTENT_GENERATION_RETRIES: ${CONTENT_GENERATION_RETRIES:-3}
    depends_on:
      - content-pipeline
    volumes:
      - shared_storage:/shared
      - backend_logs:/logs
      - ./inference-service/models:/models
    expose:
      - "8010"
    ports:
      - "8010:8010"

  voice-service:
    build:
      context: .
      dockerfile: voice-service/Dockerfile
      network: host
    container_name: pihub-voice-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VOICE_AUDIO_ROOT: ${VOICE_AUDIO_ROOT:-/shared/voice/audio}
      VOICE_BACKEND: ${VOICE_BACKEND:-faster_whisper}
      STT_PROVIDER: ${STT_PROVIDER:-faster_whisper}
      TTS_PROVIDER: ${TTS_PROVIDER:-auto}
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      GEMMA_MODEL_ID: ${GEMMA_MODEL_ID:-google/gemma-4-E4B-it}
      GEMMA_MODEL_CACHE_DIR: ${GEMMA_MODEL_CACHE_DIR:-/models/gemma4_audio}
      GEMMA_DEVICE: ${GEMMA_DEVICE:-cpu}
      GEMMA_DTYPE: ${GEMMA_DTYPE:-auto}
      GEMMA_MAX_AUDIO_SECONDS: ${GEMMA_MAX_AUDIO_SECONDS:-30}
      GEMMA_CHUNK_SECONDS: ${GEMMA_CHUNK_SECONDS:-8}
      GEMMA_CHUNK_OVERLAP_SECONDS: ${GEMMA_CHUNK_OVERLAP_SECONDS:-1}
      GEMMA_MAX_NEW_TOKENS: ${GEMMA_MAX_NEW_TOKENS:-256}
      GEMMA_INPUT_SAMPLE_RATE: ${GEMMA_INPUT_SAMPLE_RATE:-24000}
      GEMMA_STREAMING: ${GEMMA_STREAMING:-true}
      GEMMA_BATCH_SIZE: ${GEMMA_BATCH_SIZE:-1}
      GEMMA_LANGUAGE: ${GEMMA_LANGUAGE:-auto}
      VOICE_AUDIO_MANIFEST: ${VOICE_AUDIO_MANIFEST:-/shared/voice/audio_manifest.json}
      VOICE_TUTOR_URL: ${VOICE_TUTOR_URL:-http://inference-service:8010}
      VOICE_TUTOR_PATH: ${VOICE_TUTOR_PATH:-/ai/tutor}
      VOICE_TTS_ENABLED: ${VOICE_TTS_ENABLED:-true}
      SVARA_MODEL_PATH: ${SVARA_MODEL_PATH:-/models/svara/svara-tts-v1.Q4_K_M.gguf}
      SVARA_SNAC_DECODER_PATH: ${SVARA_SNAC_DECODER_PATH:-/models/svara/snac_24khz-ONNX/onnx/decoder_model.onnx}
      SVARA_SAMPLE_RATE: ${SVARA_SAMPLE_RATE:-24000}
      SVARA_MAX_TOKENS: ${SVARA_MAX_TOKENS:-768}
      SVARA_THREADS: ${SVARA_THREADS:-8}
      SVARA_CONTEXT: ${SVARA_CONTEXT:-4096}
      SVARA_GPU_LAYERS: ${SVARA_GPU_LAYERS:-99}
      SVARA_BATCH_SIZE: ${SVARA_BATCH_SIZE:-512}
      SVARA_TIMEOUT_SECONDS: ${SVARA_TIMEOUT_SECONDS:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - inference-service
    volumes:
      - shared_storage:/shared
      - ./voice-service/models:/models/svara
      - ./voice-service/models/gemma4_audio:/models/gemma4_audio
      - /home/akash/Desktop/voice-benchmark/svara_tts_onnx_benchmark/models/snac_24khz-ONNX/onnx/decoder_model.onnx:/models/svara/snac_24khz-ONNX/onnx/decoder_model.onnx:ro
      - backend_logs:/logs
    expose:
      - "8050"
    ports:
      - "8050:8050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/health', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 300s

volumes:
  qdrant_data:
  backend_logs:
  shared_storage:
